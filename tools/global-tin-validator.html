<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THEFAXMINATOR — Global TIN Validator</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/fonts/fonts.css">
  <style>
    :root {
      --bg-page:      #05050f;
      --slate-900:    #0f172a;
      --slate-800:    #1e293b;
      --slate-400:    #94a3b8;
      --slate-300:    #cbd5e1;
      --white:        #ffffff;
      --cyan-300:     #67e8f9;
      --cyan-400:     #22d3ee;
      --purple-400:   #c084fc;
      --purple-500:   #a855f7;
      --emerald-400:  #34d399;
      --red-400:      #f87171;
      --amber-400:    #fbbf24;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      background-color: #05050f;
      display: flex;
      flex-direction: column;
    }

    .title-font { font-family: 'Cinzel Decorative', cursive; font-weight: 700; }

    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .home-btn {
      transition: transform 0.2s ease, filter 0.2s ease;
    }
    .home-btn:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 0 8px #00f7ff);
    }

    /* Form fields */
    .tin-label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--slate-400);
      margin-bottom: 0.5rem;
      font-weight: 700;
      font-family: 'Cinzel Decorative', cursive;
    }

    .tin-input, .tin-select {
      width: 100%;
      background: var(--slate-900);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      color: #fff;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s ease;
      appearance: none;
      -webkit-appearance: none;
    }
    .tin-input:focus, .tin-select:focus {
      border-color: var(--cyan-400);
    }
    .tin-input::placeholder {
      color: var(--slate-400);
    }
    .tin-input.center { text-align: center; text-transform: uppercase; }

    /* Input row grid */
    .tin-fields {
      display: grid;
      grid-template-columns: 3fr 2fr 5fr;
      gap: 1.5rem;
    }
    @media (max-width: 640px) {
      .tin-fields { grid-template-columns: 1fr; }
    }

    /* Buttons */
    .btn-primary {
      flex: 3;
      background: linear-gradient(to right, var(--cyan-400), var(--purple-500));
      color: #000;
      border: none;
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      font-family: 'Cinzel Decorative', cursive;
      transition: opacity 0.2s ease;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-reset {
      flex: 1;
      background: none;
      border: 1px solid var(--slate-400);
      color: #fff;
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      font-family: 'Cinzel Decorative', cursive;
      transition: border-color 0.2s ease, color 0.2s ease;
    }
    .btn-reset:hover {
      border-color: var(--red-400);
      color: var(--red-400);
    }

    /* Result panel */
    .result-panel {
      display: none;
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(0, 0, 0, 0.40);
    }

    .neon-cyan {
      box-shadow: 0 0 25px -5px #00f7ff, 0 0 10px -2px #00f7ff;
    }

    /* Result panel */
    .result-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 2.5rem;
      align-items: start;
    }
    @media (max-width: 640px) {
      .result-grid { grid-template-columns: 1fr; }
    }

    .tin-info-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 1rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      align-items: baseline;
    }
    .tin-info-row:last-child { border-bottom: none; }

    .tin-info-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--slate-400);
      font-weight: 700;
      font-family: 'Cinzel Decorative', cursive;
    }

    .tin-info-value {
      font-size: 0.875rem;
      color: var(--white);
      word-break: break-all;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-radius: 0.75rem;
    }
    .status-badge .status-icon {
      font-size: 1.75rem;
      line-height: 1;
    }
    .status-badge .status-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .status-badge .status-msg {
      font-size: 0.875rem;
      color: var(--slate-300);
      margin-top: 0.25rem;
    }

    .tin-description {
      margin-top: 0.5rem;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.85rem;
      color: var(--slate-300);
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <!-- BACKGROUND IMAGE -->
  <div style="position:fixed; inset:0; z-index:-1; overflow:hidden;">
    <img src="../assets/backgroundimage01.png" alt="" style="width:100%; height:100%; object-fit:cover; object-position:center; display:block;">
  </div>

  <!-- HEADER -->
  <header style="border-bottom:1px solid rgba(255,255,255,0.10); background:transparent; position:fixed; top:0; left:0; right:0; z-index:50; height:80px;">
    <div style="max-width:1536px; margin:0 auto; padding:0 2.5rem; height:100%; display:flex; align-items:center; gap:1.5rem;">

      <!-- Home button -->
      <a href="../index.html" class="home-btn" title="Back to Home">
        <img src="../assets/homebutton.png" alt="Home" style="height:48px; width:auto; display:block;">
      </a>

      <!-- Page title -->
      <h1 class="title-font" style="font-size:clamp(1.2rem, 3.5vw, 3rem); letter-spacing:4px; text-shadow:0 0 30px #00f7ff, 0 0 60px #00f7ff; color:#00f7ff; margin:0; flex:1; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
        GLOBAL TIN VALIDATOR
      </h1>

    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main style="max-width:1536px; margin:0 auto; padding:2.5rem; padding-top:calc(80px + 2.5rem); display:flex; flex-direction:column; gap:2rem; flex:1; width:100%;">

    <!-- SINGLE TIN VALIDATION -->
    <div class="glass neon-cyan" style="padding:2.5rem; background:transparent; backdrop-filter:none; -webkit-backdrop-filter:none;">
      <h2 class="tin-label" style="margin:0 0 1.5rem 0;">Single TIN Validation</h2>

      <div class="tin-fields">
        <div>
          <label class="tin-label" for="single-type">TIN Type</label>
          <select id="single-type" class="tin-select">
            <option value="Individual">Individual</option>
            <option value="Entity">Entity</option>
          </select>
        </div>

        <div>
          <label class="tin-label" for="single-country">Country Code</label>
          <input id="single-country" class="tin-input center" type="text" maxlength="2" placeholder="US">
        </div>

        <div>
          <label class="tin-label" for="single-tin">Tax Identification Number (TIN)</label>
          <input id="single-tin" class="tin-input" type="text" placeholder="Enter TIN here...">
        </div>
      </div>

      <div style="display:flex; gap:1rem; margin-top:1.5rem;">
        <button class="btn-primary" onclick="runSingleValidation()">Initiate Single Validation</button>
        <button class="btn-reset" onclick="resetSingle()">Reset</button>
      </div>

      <div id="single-result" class="result-panel">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- VALIDATION RESULT -->
    <div id="result-panel" class="glass neon-cyan" style="padding:2.5rem; background:transparent; backdrop-filter:none; -webkit-backdrop-filter:none; display:none;">
      <h2 class="tin-label" style="margin:0 0 1.5rem 0;">Validation Result</h2>

      <div class="result-grid">

        <!-- Left: Flag + country name -->
        <div style="display:flex; flex-direction:column; align-items:center; gap:0.75rem;">
          <img id="result-flag" src="" alt="" style="width:100%; border-radius:0.75rem; border:1px solid rgba(255,255,255,0.15); object-fit:cover; display:none;">
          <div id="result-flag-placeholder" style="width:100%; aspect-ratio:3/2; border-radius:0.75rem; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; display:none;">
            <span style="font-size:2rem; opacity:0.4;">🏳</span>
          </div>
          <span id="result-country-code" class="tin-label" style="margin:0; text-align:center; font-size:1rem; color:var(--cyan-300);"></span>
          <span id="result-country-name" style="font-size:0.8rem; color:var(--slate-400); text-align:center;"></span>
        </div>

        <!-- Right: Status badge + TIN info -->
        <div style="display:flex; flex-direction:column; gap:1.25rem;">
          <div id="result-status-badge"></div>
          <div id="result-tin-info"></div>
        </div>

      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer style="border-top:1px solid rgba(255,255,255,0.10); background:rgba(0,0,0,0.70); padding:1.25rem 2.5rem; color:var(--slate-400); font-size:0.875rem; flex-shrink:0;">
    <div style="max-width:1536px; margin:0 auto; display:flex; flex-direction:column; align-items:center; gap:0.6rem; text-align:center;">
      <div style="display:flex; align-items:center; gap:1.25rem; flex-wrap:wrap; justify-content:center; font-size:0.8rem;">
        <span class="title-font" style="color:#fff; font-size:0.75rem; letter-spacing:2px;">THEFAXMINATOR 2.0</span>
        <span style="color:rgba(255,255,255,0.2);">|</span>
        <a href="../index.html" style="color:var(--slate-400); text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#22d3ee'" onmouseout="this.style.color='#94a3b8'">Home</a>
        <span style="color:rgba(255,255,255,0.2);">·</span>
        <a href="global-tin-validator.html" style="color:var(--slate-400); text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#22d3ee'" onmouseout="this.style.color='#94a3b8'">Global TIN Validator</a>
        <span style="color:rgba(255,255,255,0.2);">·</span>
        <a href="countries.html" style="color:var(--slate-400); text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#22d3ee'" onmouseout="this.style.color='#94a3b8'">TIN's by Country</a>
        <span style="color:rgba(255,255,255,0.2);">|</span>
        <span>© 2026</span>
      </div>
      <p style="margin:0; font-size:0.72rem; color:var(--slate-400); max-width:640px; line-height:1.6;">
        For reference purposes only. Always verify TIN requirements with the relevant tax authority.
      </p>
    </div>
  </footer>


  <!-- Shared utilities (always loaded) -->
  <script src="js/utils/date-utils.js"></script>
  <script src="js/utils/checksum-utils.js"></script>
  <script src="js/utils/tin-format-legend.js"></script>
  <!-- Engine: lazy-loads per-country modules on demand -->
  <script src="js/tin-engine.js"></script>

  <script>
    async function runSingleValidation() {
      const type    = document.getElementById('single-type').value;
      const country = document.getElementById('single-country').value.trim().toUpperCase();
      const tin     = document.getElementById('single-tin').value.trim();

      const panel = document.getElementById('result-panel');
      panel.style.display = 'block';
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

      // Show a brief loading state while the country module loads
      document.getElementById('result-status-badge').innerHTML =
        '<div style="color:var(--slate-400); padding:0.5rem;">Validating…</div>';
      document.getElementById('result-tin-info').innerHTML    = '';
      document.getElementById('result-flag').style.display   = 'none';
      document.getElementById('result-flag-placeholder').style.display = 'none';
      document.getElementById('result-country-code').textContent = country || '—';
      document.getElementById('result-country-name').textContent = '';

      const result = await TINEngine.validate(country, type, tin);
      renderResult(result);
    }

    function renderResult(r) {
      // --- Flag ---
      const flagImg         = document.getElementById('result-flag');
      const flagPlaceholder = document.getElementById('result-flag-placeholder');

      if (r.flag) {
        flagImg.src             = r.flag;
        flagImg.alt             = r.countryName || r.countryCode;
        flagImg.style.display   = 'block';
        flagPlaceholder.style.display = 'none';
      } else {
        flagImg.style.display         = 'none';
        flagPlaceholder.style.display = 'flex';
      }
      document.getElementById('result-country-code').textContent = r.countryCode || '—';
      document.getElementById('result-country-name').textContent =
        r.countryName || (r.status === 'unknown' ? 'Unknown Country' : '');

      // --- Status badge ---
      const badge = document.getElementById('result-status-badge');
      if (r.status === 'valid') {
        badge.innerHTML = `
          <div class="status-badge" style="background:rgba(52,211,153,0.12); border:1px solid var(--emerald-400);">
            <span class="status-icon">✓</span>
            <div>
              <div class="status-title" style="color:var(--emerald-400);">Valid</div>
              <div class="status-msg">${escapeHtml(r.message)}</div>
            </div>
          </div>`;
      } else if (r.status === 'invalid') {
        badge.innerHTML = `
          <div class="status-badge" style="background:rgba(248,113,113,0.12); border:1px solid var(--red-400);">
            <span class="status-icon">✗</span>
            <div>
              <div class="status-title" style="color:var(--red-400);">Invalid</div>
              <div class="status-msg">${escapeHtml(r.message)}</div>
            </div>
          </div>`;
      } else {
        const title = r.status === 'missing' ? 'Missing Input' : r.status === 'no-tin' ? 'No TIN Issued' : 'Unknown';
        badge.innerHTML = `
          <div class="status-badge" style="background:rgba(251,191,36,0.12); border:1px solid var(--amber-400);">
            <span class="status-icon">⚠</span>
            <div>
              <div class="status-title" style="color:var(--amber-400);">${title}</div>
              <div class="status-msg">${escapeHtml(r.message)}</div>
            </div>
          </div>`;
      }

      // --- TIN info rows ---
      const info = document.getElementById('result-tin-info');
      if (r.tinName) {
        // Only show "full guide" link for countries that have a page
        const SUPPORTED_COUNTRIES = ['NO', 'US', 'SE', 'DK', 'IS', 'ES', 'FI', 'GB', 'CH', 'MC', 'DE'];
        const hasPage = SUPPORTED_COUNTRIES.includes(r.countryCode);
        const guideLink = hasPage ? `
          <a href="countries.html?country=${r.countryCode}"
             style="display:inline-flex; align-items:center; gap:0.5rem; margin-top:1.25rem;
                    border:1px solid rgba(34,211,238,0.40); color:var(--cyan-400);
                    padding:0.55rem 1.25rem; border-radius:0.75rem; font-size:0.8rem;
                    text-transform:uppercase; letter-spacing:0.1em; font-weight:600;
                    text-decoration:none; font-family:'Cinzel Decorative',cursive;
                    transition:background 0.2s, border-color 0.2s;"
             onmouseover="this.style.background='rgba(34,211,238,0.08)';this.style.borderColor='rgba(34,211,238,0.70)'"
             onmouseout="this.style.background='transparent';this.style.borderColor='rgba(34,211,238,0.40)'">
            View Full TIN Guide &nbsp;→
          </a>` : '';

        info.innerHTML = `
          <div class="tin-info-row">
            <span class="tin-info-label">TIN Type</span>
            <span class="tin-info-value">${escapeHtml(r.tinName)}</span>
          </div>
          <div class="tin-info-row">
            <span class="tin-info-label">Format</span>
            <span class="tin-info-value">${escapeHtml(r.format)}</span>
          </div>
          <div class="tin-info-row">
            <span class="tin-info-label">Submitted TIN</span>
            <span class="tin-info-value" style="font-family:monospace; letter-spacing:0.08em;">${escapeHtml(r.submittedTin.toUpperCase())}</span>
          </div>
          ${r.description ? `<div class="tin-description">${formatDesc(r.description)}</div>` : ''}
          ${TINFormatLegend.renderCard()}
          ${guideLink}
        `;
      } else {
        info.innerHTML = '';
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDesc(str) {
      return escapeHtml(str).split('\n').map(line => {
        if (line === '') return '<br>';
        if (line.startsWith('• '))
          return '<div style="padding-left:1.1em;text-indent:-1.1em;margin:0;">' + line + '</div>';
        if (/^[  ]{2,}[◦○]/.test(line))
          return '<div style="padding-left:2.4em;text-indent:-1.1em;margin:0;">◦ ' + line.replace(/^[\s ]+[◦○]\s?/, '') + '</div>';
        return '<div style="margin:0;">' + line + '</div>';
      }).join('');
    }

    function resetSingle() {
      document.getElementById('single-type').value = 'Individual';
      document.getElementById('single-country').value = '';
      document.getElementById('single-tin').value = '';
      document.getElementById('result-panel').style.display = 'none';
    }
  </script>

</body>
</html>
